# ── Global variables available to all stages
variables:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
  BACKEND_IMAGE: $ECR_REGISTRY/taskmanager-backend
  FRONTEND_IMAGE: $ECR_REGISTRY/taskmanager-frontend
  SONAR_HOST: $SONAR_HOST_URL

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

stages:
  - test
  - sast
  - build
  - scan
  - push-ecr-login

# ──────────────────────────────────────────────
# STAGE 1 — TEST
# ──────────────────────────────────────────────
backend-tests:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install -r taskmanager/backend/requirements.txt
  script:
    - cd taskmanager/backend
    - pytest test_app.py -v
  artifacts:
    reports:
      junit: taskmanager/backend/report.xml
    expire_in: 1 week

# ──────────────────────────────────────────────
# STAGE 2 — SAST
# ──────────────────────────────────────────────
sonarqube-scan:
  stage: sast
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  script:
    - |
      sonar-scanner \
        -Dsonar.projectKey=taskmanager \
        -Dsonar.sources=taskmanager/backend \
        -Dsonar.host.url=$SONAR_HOST \
        -Dsonar.token=$SONAR_TOKEN \
        -exit-code 0
  allow_failure: true

# ──────────────────────────────────────────────
# STAGE 3 — BUILD
# ──────────────────────────────────────────────
build-backend:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker info
  script:
    - docker build -t $BACKEND_IMAGE:$CI_COMMIT_SHA -t $BACKEND_IMAGE:latest ./taskmanager/backend
    - docker save $BACKEND_IMAGE:$CI_COMMIT_SHA > backend-image.tar
  artifacts:
    paths:
      - backend-image.tar
    expire_in: 1 hour

build-frontend:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build -t $FRONTEND_IMAGE:$CI_COMMIT_SHA -t $FRONTEND_IMAGE:latest ./taskmanager/frontend
    - docker save $FRONTEND_IMAGE:$CI_COMMIT_SHA > frontend-image.tar
  artifacts:
    paths:
      - frontend-image.tar
    expire_in: 1 hour

# ──────────────────────────────────────────────
# STAGE 4 — SCAN
# ──────────────────────────────────────────────
trivy-backend:
  stage: scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy image --input backend-image.tar --format json --output trivy-backend-report.json --severity CRITICAL --exit-code 0 --no-progress
  artifacts:
    reports:
      container_scanning: trivy-backend-report.json

trivy-frontend:
  stage: scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy image --input frontend-image.tar --format json --output trivy-frontend-report.json --severity CRITICAL --exit-code 1 --no-progress
  artifacts:
    reports:
      container_scanning: trivy-frontend-report.json

# ──────────────────────────────────────────────
# STAGE 5 — PUSH
# ──────────────────────────────────────────────
ecr-login:
  stage: deploy
  image: amazon/aws-cli:2.15.0
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - yum install -y docker || true
  script:
    - aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
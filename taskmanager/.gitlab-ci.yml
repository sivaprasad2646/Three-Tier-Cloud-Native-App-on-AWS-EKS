# ── Global variables available to all stages
variables:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
  BACKEND_IMAGE: $ECR_REGISTRY/taskmanager-backend
  FRONTEND_IMAGE: $ECR_REGISTRY/taskmanager-frontend
  SONAR_HOST: $SONAR_HOST_URL   # Set in GitLab CI/CD variables

# ── Pipeline runs on every push to main or any merge request
workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

stages:
  - test
  - sast
  - build
  - scan
  - push

# ──────────────────────────────────────────────
# STAGE 1 — TEST (Run unit tests)
# ──────────────────────────────────────────────
backend-tests:
  stage: test
  image: python:3.11-slim
  before_script:
    - pip install -r backend/requirements.txt
  script:
    - cd backend
    - pytest test_app.py -v
  # Store test results as artifact (viewable in GitLab UI)
  artifacts:
    reports:
      junit: backend/report.xml
    expire_in: 1 week

# ──────────────────────────────────────────────
# STAGE 2 — SAST (SonarQube code quality scan)
# ──────────────────────────────────────────────
sonarqube-scan:
  stage: sast
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"   # Full git history needed for accurate blame
  script:
    - sonar-scanner
        -Dsonar.projectKey=taskmanager
        -Dsonar.sources=backend
        -Dsonar.host.url=$SONAR_HOST
        -Dsonar.login=$SONAR_TOKEN
  allow_failure: true   # Don't block pipeline if SonarQube is not set up yet

# ──────────────────────────────────────────────
# STAGE 3 — BUILD (Build Docker images)
# ──────────────────────────────────────────────
build-backend:
  stage: build
  image: docker:24-dind    # Docker-in-Docker
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker info
  script:
    # Tag with both commit SHA (unique) and latest
    - docker build -t $BACKEND_IMAGE:$CI_COMMIT_SHA -t $BACKEND_IMAGE:latest ./backend
    # Save image to file to pass to next stage
    - docker save $BACKEND_IMAGE:$CI_COMMIT_SHA > backend-image.tar
  artifacts:
    paths:
      - backend-image.tar
    expire_in: 1 hour

build-frontend:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker build -t $FRONTEND_IMAGE:$CI_COMMIT_SHA -t $FRONTEND_IMAGE:latest ./frontend
    - docker save $FRONTEND_IMAGE:$CI_COMMIT_SHA > frontend-image.tar
  artifacts:
    paths:
      - frontend-image.tar
    expire_in: 1 hour

# ──────────────────────────────────────────────
# STAGE 4 — SCAN (Trivy image vulnerability scan)
# ──────────────────────────────────────────────
trivy-backend:
  stage: scan
  image: aquasec/trivy:latest
  before_script:
    - docker load < backend-image.tar
  script:
    # --exit-code 1 means pipeline FAILS if CRITICAL CVEs found
    - trivy image
        --exit-code 1
        --severity CRITICAL
        --no-progress
        $BACKEND_IMAGE:$CI_COMMIT_SHA
  artifacts:
    reports:
      container_scanning: trivy-backend-report.json

trivy-frontend:
  stage: scan
  image: aquasec/trivy:latest
  before_script:
    - docker load < frontend-image.tar
  script:
    - trivy image
        --exit-code 1
        --severity CRITICAL
        --no-progress
        $FRONTEND_IMAGE:$CI_COMMIT_SHA
  artifacts:
    reports:
      container_scanning: trivy-frontend-report.json

# ──────────────────────────────────────────────
# STAGE 5 — PUSH (Push to Amazon ECR)
# ──────────────────────────────────────────────
push-to-ecr:
  stage: push
  image: docker:24-dind
  services:
    - docker:24-dind
  before_script:
    # Install AWS CLI inside the job
    - apk add --no-cache aws-cli
    # Authenticate Docker to ECR using IAM credentials
    - aws ecr get-login-password --region $AWS_REGION |
        docker login --username AWS --password-stdin $ECR_REGISTRY
  script:
    - docker load < backend-image.tar
    - docker load < frontend-image.tar
    - docker push $BACKEND_IMAGE:$CI_COMMIT_SHA
    - docker push $BACKEND_IMAGE:latest
    - docker push $FRONTEND_IMAGE:$CI_COMMIT_SHA
    - docker push $FRONTEND_IMAGE:latest
  # Only push on main branch — not on merge requests
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
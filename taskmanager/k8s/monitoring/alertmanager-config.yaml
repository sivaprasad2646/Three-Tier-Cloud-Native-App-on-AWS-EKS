apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-prometheus-stack-kube-prom-alertmanager
  namespace: monitoring
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m

    # ── Where to send alerts
    receivers:
      - name: "slack-notifications"
        slack_configs:
          - api_url: "$SLACK_WEBHOOK_URL"
            channel: "#devops-alerts"
            title: "{{ .GroupLabels.alertname }}"
            text: >-
              {{ range .Alerts }}
                *Alert:* {{ .Annotations.summary }}
                *Severity:* {{ .Labels.severity }}
                *Description:* {{ .Annotations.description }}
              {{ end }}
            send_resolved: true   # Also notify when issue is resolved

    # ── Routing rules
    route:
      group_by: ['alertname', 'namespace']
      group_wait: 30s          # Wait 30s before sending, group related alerts
      group_interval: 5m
      repeat_interval: 4h      # Re-alert every 4h if still firing
      receiver: "slack-notifications"
      routes:
        - match:
            severity: critical
          receiver: "slack-notifications"
          repeat_interval: 1h  # Critical alerts repeat every 1h
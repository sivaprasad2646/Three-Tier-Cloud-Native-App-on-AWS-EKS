server {
    listen 80;

    # Serve React static files
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;  # Required for React Router
    }

    # Proxy API calls to Flask backend
    location /api/ {
        proxy_pass http://backend-service:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

#🚀 Why this setup is used
#Single entry point (NGINX)
#Separates frontend & backend cleanly
#Works great with:
#Docker
#Kubernetes
#Ingress
#No CORS issues (same domain)
#✅ One-line summary

#👉 This NGINX config:

#Serves a React frontend
#Routes /api requests to a Flask backend
#Handles React routing properly using try_files
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: {{ .Release.namespace }}
  labels:
    {{- include "taskmanager.labels" . | nindent 4 }}
    app: frontend

spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: {{ .Values.frontend.port }}
      targetPort: {{ .Values.frontend.port }}
  type: ClusterIP
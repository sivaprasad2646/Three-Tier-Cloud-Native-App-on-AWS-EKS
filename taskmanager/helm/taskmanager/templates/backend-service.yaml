apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: {{ .Release.namespace }}
  labels:
    {{- include "taskmanager.labels" . | nindent 4 }}
    app: backend

spec:
  selector:
    app: backend
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
      protocol: TCP
  type: ClusterIP
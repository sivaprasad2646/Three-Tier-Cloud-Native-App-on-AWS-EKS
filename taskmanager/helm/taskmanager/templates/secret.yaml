apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: {{ .Release.namespace }}
  labels:
    {{ include "taskmanager.labels" . | nindent 4 }}
type: Opaque
data:
  DB_USER: {{ .Values.database.user | b64enc | quote }}
  DB_PASSWORD: {{ .Values.database.password | b64enc | quote }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-config
  namespace: {{ .Release.namespace }}
  labels:
    {{- include "taskmanager.labels" . | nindent 4 }}
data:
  DB_HOST: {{ .Values.database.host | quote }}
  DB_NAME: {{ .Values.database.name | quote }}
  DB_PORT: {{ .Values.database.port | quote }}